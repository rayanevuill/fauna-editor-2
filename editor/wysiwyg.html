  {icon:"fa-skull-crossbones",fr:"Venin",en:"Venom"},{icon:"fa-bolt",fr:"Langue",en:"Tongue"}
];

];

/* ===================== STATE ===================== */
function blankLang(){return{name:"",sci:"",intro:"",introImg:"",introMap:"",sections:[]};}
let meta={slug:"",order:{slug:"sauria",name:"Sauria"},family:{slug:"varanidae",name:"Varanidae"},title:{en:"",fr:"",ar:""},description:{en:"",fr:"",ar:""}};
let state={

      sections:[{title:"Description",icon:"fa-info-circle",blocks:[{type:"text",text:"The desert monitor (*Varanus griseus*) is the largest Saharan lizard{{r1}}."},{type:"gallery-16-9",images:[{src:"images/encyclopedia/sauria/varanidae/varanus-griseus/varanus-griseus-1.jpg",cap:"Relaxed posture.",alt:"Relaxed monitor"}]}],subs:[{title:"Behavior",icon:"fa-cogs",text:"Nocturnal, buries in sand."}],subspecies:[]}]}
  }

/* ===================== helpers texte <-> DOM ===================== */
const G=window.FaunaGenerator, P=window.FaunaPage, G2=window.FaunaGenerator2, IMP=window.FaunaImporter2;
function refNum(key){const i=state.refs.findIndex(r=>r.key===key);return i<0?"?":i+1;}
function textToHTML(t){
  let h=(t||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
  h=h.replace(/\*([^*\n]+)\*/g,"<em>$1</em>");
  h=h.replace(/\{\{([^}]+)\}\}/g,(m,k)=>`<sup class="refchip" contenteditable="false" data-key="${k.trim()}">${refNum(k.trim())}</sup>`);
  return h;
}
function htmlToText(el){
  let out="";el.childNodes.forEach(n=>{
    if(n.nodeType===3)out+=n.nodeValue;
    else if(n.nodeName==="EM"||n.nodeName==="I")out+="*"+n.textContent+"*";
    else if(n.classList&&n.classList.contains("refchip"))out+="{{"+n.dataset.key+"}}";
    else if(n.nodeName==="BR")out+="\n";
    else out+=n.textContent;
  });return out.trim();
}
/* Aperçu local des images choisies avant upload réel (branché serveur plus tard) */
const previewMap={}, pendingUploads={};
function disp(p){return p?(previewMap[p]||(DISP+p)):"";}
function folderFor(){return `images/encyclopedia/${meta.order.slug}/${meta.family.slug}/${meta.slug||"slug"}/`;}
function labelOf(t){return({"gallery-16-9":"Paysage 16:9","gallery-2-3":"Portrait 2:3","gallery-5-4":"Diaporama","gallery-full-width":"Pleine largeur","distribution-map":"Carte de répartition"})[t]||"Image";}
function dropZone(folder,onFile){
  const dz=el("div","dz");dz.innerHTML='<i class="fas fa-cloud-arrow-up"></i><div>Glisse une image ici<br><small>ou clique pour choisir un fichier</small></div>';
  const inp=document.createElement("input");inp.type="file";inp.accept="image/*";inp.style.display="none";dz.appendChild(inp);
  dz.onclick=()=>inp.click();
  inp.onchange=()=>{if(inp.files[0])handle(inp.files[0]);};
  dz.ondragover=e=>{e.preventDefault();dz.classList.add("over");};
  dz.ondragleave=()=>dz.classList.remove("over");
  dz.ondrop=e=>{e.preventDefault();dz.classList.remove("over");if(e.dataTransfer.files[0])handle(e.dataTransfer.files[0]);};
  function handle(file){
    const name=file.name.toLowerCase().replace(/[^a-z0-9.]+/g,"-").replace(/-+/g,"-").replace(/^-|-(?=\.)/g,"");
    const path=folder+name;previewMap[path]=URL.createObjectURL(file);pendingUploads[path]=file;onFile(path,file);uploadImage(path,file);
  }
  return dz;
}
function openImagePicker(opts){
  const{b,close}=floatBox(opts.x!=null?opts.x:innerWidth/2-170,opts.y!=null?opts.y:120,340);
  let style=opts.style||null;
  function paintStyles(){
    b.innerHTML='<div class="pkh">Choisis le format de l\'image</div>';
    const grid=el("div");grid.style.cssText="display:grid;grid-template-columns:1fr 1fr;gap:6px;padding:4px";
    [["gallery-16-9","fa-image","Paysage 16:9"],["gallery-2-3","fa-image","Portrait 2:3"],["gallery-5-4","fa-images","Diaporama"],["gallery-full-width","fa-panorama","Pleine largeur"],["distribution-map","fa-map-location-dot","Carte"]].forEach(([t,ic,l])=>{const btn=el("button","pk");btn.style.cssText="justify-content:center;background:#1c1c1c";btn.innerHTML=`<i class="fas ${ic}"></i> ${l}`;btn.onclick=()=>{style=t;paintDrop();};grid.appendChild(btn);});
    b.appendChild(grid);
  }
  function paintDrop(){
    b.innerHTML='<div class="pkh">'+(style?labelOf(style):"Ajouter une image")+'</div>';
    if(opts.chooseStyle){const back=el("button","pk");back.innerHTML='<i class="fas fa-arrow-left"></i> changer de style';back.onclick=paintStyles;b.appendChild(back);}
    b.appendChild(dropZone(folderFor(),(path)=>{close();opts.onPick(path,style);}));
    const or=el("div","pkh");or.textContent="ou un chemin déjà en ligne";b.appendChild(or);

function sectionEl(s,si){
  const item=el("div","accordion-item");
  const head=el("button","accordion-header active");const hc=el("div","accordion-header-content");
  const icon=document.createElement("i");icon.className="fas secicon "+(s.icon||"fa-leaf");icon.title="Changer l'icône";icon.onclick=e=>{e.stopPropagation();setSectionIcon(si,e);};hc.appendChild(icon);
  const title=document.createElement("span");title.setAttribute("contenteditable","true");title.dataset.ed="1";title.dataset.ph="Titre";title.textContent=s.title||"";title.oninput=()=>s.title=title.textContent;title.onclick=e=>e.stopPropagation();hc.appendChild(title);
  const ctl=el("span","ctl");
  ctl.appendChild(mini("↑",e=>{e.stopPropagation();moveSection(si,-1);}));
  ctl.appendChild(mini("↓",e=>{e.stopPropagation();moveSection(si,1);}));
  ctl.appendChild(mini("✕",e=>{e.stopPropagation();if(confirm("Supprimer la section ?"))removeSection(si);}));
  hc.appendChild(ctl);head.appendChild(hc);head.insertAdjacentHTML("beforeend",'<i class="fas fa-chevron-down accordion-arrow"></i>');item.appendChild(head);

// rend une liste d'items ordonnés dans `container`, cp = chemin du conteneur
function renderItems(container,cp,items){
  container.appendChild(insBar(cp,0));
  items.forEach((it,i)=>{container.appendChild(itemEl(it,cp,i));container.appendChild(insBar(cp,i+1));});
}
function ctlEl(cp,i){const ctl=el("span","ctl");
  ctl.appendChild(mini("↑",e=>{e.stopPropagation();movItem(cp,i,-1);}));
  ctl.appendChild(mini("↓",e=>{e.stopPropagation();movItem(cp,i,1);}));
  ctl.appendChild(mini("✕",e=>{e.stopPropagation();delItem(cp,i);}));
  return ctl;
}

    const hc=el("div","sub-section-header-content");const ic=document.createElement("i");ic.className="fas secicon "+(it.icon||"fa-cogs");ic.onclick=e=>{e.stopPropagation();openIconPicker(e,it.icon,icon=>{eachLang(c=>itemAt(c,cp,i).icon=icon);render();});};hc.appendChild(ic);
    const t=document.createElement("span");t.setAttribute("contenteditable","true");t.dataset.ed="1";t.dataset.ph="Titre";t.textContent=it.title||"";t.oninput=()=>it.title=t.textContent;t.onclick=e=>e.stopPropagation();hc.appendChild(t);
    hc.appendChild(ctlEl(cp,i));h.appendChild(hc);h.insertAdjacentHTML("beforeend",'<i class="fas fa-chevron-down sub-section-arrow"></i>');d.appendChild(h);
    const cont=el("div","sub-section-content active");cont.style.maxHeight="none";cont.style.overflow="visible";const body=el("div","sub-section-body");
    renderItems(body,cp.concat(i),it.items||[]);cont.appendChild(body);d.appendChild(cont);return d;
  }
  if(k==="subspecies"){
    const box=el("div","subsp");const sh=el("div","sh");sh.innerHTML='<i class="fas fa-sitemap"></i>';
    const t=document.createElement("span");t.setAttribute("contenteditable","true");t.dataset.ed="1";t.dataset.ph="Nom de la sous-espèce (ex. *Salamandra algira atlantica*)";t.style.color="#e9e3d7";t.innerHTML=textToHTML(it.title);t.oninput=()=>it.title=htmlToText(t);bindSel(t);sh.appendChild(t);
    sh.appendChild(ctlEl(cp,i));box.appendChild(sh);
    const body=el("div");renderItems(body,cp.concat(i),it.items||[]);box.appendChild(body);
    box.appendChild(edGlobalCap(it));return box;
  }
  // galeries / carte
  const t=k;const wrap=el("div");

  const grid=el("div",t+"-grid");grid.style.display="grid";grid.style.gridTemplateColumns=SINGLE[t]?"1fr":"1fr 1fr";grid.style.gap="8px";
  (it.images||[]).forEach((im,ii)=>grid.appendChild(imageCard(im,t,()=>{eachLang(c=>{itemAt(c,cp,i).images[ii].src=im.src;});},()=>{eachLang(c=>itemAt(c,cp,i).images.splice(ii,1));render();})));
  wrap.appendChild(grid);
  if(!SINGLE[t]||!(it.images||[]).length)
    wrap.appendChild(chip("＋ Photo",(e)=>openImagePicker({x:e.clientX,y:e.clientY+10,onPick:v=>{eachLang(c=>{const iu=itemAt(c,cp,i);(iu.images=iu.images||[]).push({src:v,cap:"",alt:""});});render();}})));
  if(t==="gallery-5-4"){wrap.appendChild(edGlobalCap(it));}

function imageCard(im,t,onSrc,onDel){

// cp = chemin du conteneur : [si] = corps de section ; [si,i,...] = items d'une sous-section/sous-espèce
function arrAt(c,cp){let a=c.sections[cp[0]].items;for(let d=1;d<cp.length;d++)a=a[cp[d]].items;return a;}
function itemAt(c,cp,i){return arrAt(c,cp)[i];}
function insItem(cp,pos,factory){eachLang(c=>arrAt(c,cp).splice(pos,0,factory()));render();}
function delItem(cp,pos){eachLang(c=>arrAt(c,cp).splice(pos,1));render();}
function movItem(cp,pos,dir){const j=pos+dir;eachLang(c=>{const a=arrAt(c,cp);if(j<0||j>=a.length)return;const x=a.splice(pos,1)[0];a.splice(j,0,x);});render();}
function newItem(k){
  if(k==="text")return{kind:"text",text:""};
  if(k==="heading")return{kind:"heading",level:"h4",text:""};
  if(k==="list")return{kind:"list",items:[{kind:"text",text:""}]};
  if(k==="sub-section")return{kind:"sub-section",title:"Sous-section",icon:"fa-cogs",items:[{kind:"text",text:""}]};
  if(k==="subspecies")return{kind:"subspecies",title:"Sous-espèce",globalCap:"",items:[{kind:"text",text:""}]};
  return{kind:k,images:[],globalCap:""};
}

let lastRange=null;

function showSel(){const sel=window.getSelection();const st=document.getElementById("seltool");if(!sel.rangeCount||sel.isCollapsed){st.classList.remove("show");return;}lastRange=sel.getRangeAt(0);const r=lastRange.getBoundingClientRect();st.style.left=(r.left+r.width/2-52+scrollX)+"px";st.style.top=(r.top-46+scrollY)+"px";st.classList.add("show");}
function fmt(cmd){document.execCommand(cmd,false,null);const a=document.activeElement;if(a&&a.dataset&&a.dataset.ed)a.dispatchEvent(new Event("input"));}
function openCite(ev){
  ev.stopPropagation();
  if(!state.refs.length){alert("Ajoute d'abord une référence en bas de page.");return;}
  const st=document.getElementById("seltool");const r=st.getBoundingClientRect();
  const{b,close}=floatBox(r.left,r.bottom+6,300);b.innerHTML='<div class="pkh">Insérer un renvoi vers…</div>';
  state.refs.forEach((rf,i)=>{const btn=el("button","pk");btn.innerHTML=`<i class="fas fa-book"></i> <b>${i+1}.</b> <small>${rf.text.replace(/<[^>]+>/g,"").slice(0,44)}</small>`;btn.onmousedown=e=>e.preventDefault();btn.onclick=()=>{close();insertCite(rf.key,i+1);};b.appendChild(btn);});
}
function insertCite(key,n){
  const sel=window.getSelection();if(lastRange){sel.removeAllRanges();sel.addRange(lastRange);}
  const chipEl=document.createElement("sup");chipEl.className="refchip";chipEl.contentEditable="false";chipEl.dataset.key=key;chipEl.textContent=n;
  if(lastRange){lastRange.collapse(false);lastRange.insertNode(chipEl);const host=chipEl.closest("[data-ed]");if(host)host.dispatchEvent(new Event("input"));}
  document.getElementById("seltool").classList.remove("show");
}

/* ===================== MÉTADONNÉES ===================== */
function pagePath(){return `encyclopedia/${meta.order.slug||"?"}/${meta.family.slug||"?"}/${meta.slug||"?"}.html`;}
function renderMeta(){
  const f=document.getElementById("metaform");if(!f)return;f.innerHTML="";
  const url=el("div");url.innerHTML='<label>Adresse de la page (URL)</label>';const up=el("div","urlprev");up.textContent="/"+pagePath();url.appendChild(up);f.appendChild(url);
  // slug
  f.appendChild(field("Slug (identifiant dans l'URL)",inputBind(()=>meta.slug,v=>meta.slug=v,"cerastes-cerastes",()=>{const s=el("button","pkok");})));
  const slugRow=f.lastChild.querySelector("input");
  const autoBtn=document.createElement("button");autoBtn.className="add-chip";autoBtn.textContent="⤺ depuis le nom scientifique";autoBtn.onclick=()=>{meta.slug=G.slugify(state.langs.en.sci||state.langs.fr.sci);renderMeta();};f.lastChild.appendChild(autoBtn);
  // ordre
  f.appendChild(field("Ordre",selectBind(ORDERS,()=>meta.order.slug,(slug,name)=>{meta.order={slug,name};renderMeta();},"＋ Autre ordre…",()=>{const slug=prompt("Slug de l'ordre (ex. testudines) :","");if(!slug)return;const name=prompt("Nom affiché :",slug.charAt(0).toUpperCase()+slug.slice(1));meta.order={slug:slug.toLowerCase(),name:name||slug};renderMeta();})));
  // famille
  const fams=FAMILIES.filter(x=>x.order===meta.order.slug);
  f.appendChild(field("Famille",selectBind(fams,()=>meta.family.slug,(slug,name)=>{meta.family={slug,name};renderMeta();},"＋ Autre famille…",()=>{const slug=prompt("Slug de la famille (ex. viperidae) :","");if(!slug)return;const name=prompt("Nom affiché :",slug.charAt(0).toUpperCase()+slug.slice(1));meta.family={slug:slug.toLowerCase(),name:name||slug};renderMeta();})));
  // SEO
  const seo=el("div");seo.innerHTML='<label>Titre SEO (FR)</label>';seo.appendChild(inputBind(()=>meta.title.fr,v=>meta.title.fr=v,(state.langs.fr.name||"")+" — "+(state.langs.fr.sci||"")));f.appendChild(seo);
  const seoE=el("div");seoE.innerHTML='<label>Titre SEO (EN)</label>';seoE.appendChild(inputBind(()=>meta.title.en,v=>meta.title.en=v,(state.langs.en.name||"")+" — "+(state.langs.en.sci||"")));f.appendChild(seoE);
  const d1=el("div");d1.innerHTML='<label>Description SEO (FR)</label>';const ta1=document.createElement("textarea");ta1.value=meta.description.fr;ta1.oninput=()=>meta.description.fr=ta1.value;d1.appendChild(ta1);f.appendChild(d1);
  const d2=el("div");d2.innerHTML='<label>Description SEO (EN)</label>';const ta2=document.createElement("textarea");ta2.value=meta.description.en;ta2.oninput=()=>meta.description.en=ta2.value;d2.appendChild(ta2);f.appendChild(d2);
  const seoA=el("div");seoA.innerHTML='<label>Titre SEO (AR)</label>';seoA.appendChild(inputBind(()=>meta.title.ar,v=>meta.title.ar=v,(state.langs.ar&&state.langs.ar.name)||""));f.appendChild(seoA);
  const d3=el("div");d3.innerHTML='<label>Description SEO (AR)</label>';const ta3=document.createElement("textarea");ta3.value=meta.description.ar||"";ta3.oninput=()=>meta.description.ar=ta3.value;d3.appendChild(ta3);f.appendChild(d3);
  const warn=el("div","miniwarn");warn.innerHTML="⚠︎ L'ordre et la famille doivent déjà exister sur le site (pages <code>"+meta.order.slug+".html</code> et <code>"+meta.family.slug+".html</code>) pour que le fil d'Ariane fonctionne.";f.appendChild(warn);
}
function field(label,node){const d=el("div");d.innerHTML=`<label>${label}</label>`;d.appendChild(node);return d;}
function inputBind(get,set,ph){const i=document.createElement("input");i.value=get()||"";i.placeholder=ph||"";i.oninput=()=>{set(i.value);const up=document.querySelector("#metaform .urlprev");if(up)up.textContent="/"+pagePath();};return i;}
function selectBind(list,getSlug,onPick,customLabel,onCustom){
  const s=document.createElement("select");
  list.forEach(o=>{const op=document.createElement("option");op.value=o.slug;op.textContent=o.name;if(o.slug===getSlug())op.selected=true;s.appendChild(op);});
  const cu=document.createElement("option");cu.value="__custom";cu.textContent=customLabel;s.appendChild(cu);
  s.onchange=()=>{if(s.value==="__custom"){onCustom();}else{const o=list.find(x=>x.slug===s.value);onPick(o.slug,o.name);}};
  return s;
}
function toggleDrawer(){document.getElementById("drawer").classList.toggle("show");renderMeta();}

/* ===================== NOUVELLE PAGE ===================== */
function newPage(){
  if(!confirm("Nouvelle fiche vierge ? Le contenu actuel non enregistré sera perdu."))return;
  meta={slug:"",order:{slug:"sauria",name:"Sauria"},family:{slug:"varanidae",name:"Varanidae"},title:{en:"",fr:""},description:{en:"",fr:""}};
  state={statusCode:"LC",trendCode:"decreasing",refs:[],langs:{fr:blankLang(),en:blankLang()}};
  eachLang((c,l)=>c.sections.push({title:l==="fr"?"Description":"Description",icon:"fa-info-circle",blocks:[{type:"text",text:""}],subs:[],subspecies:[]}));
  render();document.getElementById("drawer").classList.add("show");
}

/* ===================== SORTIE (aperçu / JSON) ===================== */
function walkImgs(items,P){(items||[]).forEach(it=>{if(it.images)it.images.forEach(im=>{if(im.src)im.src=P(im.src);});if(it.items)walkImgs(it.items,P);});}
function buildStateRel(rel){   // pour l'aperçu : affiche les nouvelles images (blob) sinon chemin absolu
  const cl=JSON.parse(JSON.stringify(state));
  LANGS.forEach(l=>{const c=cl.langs[l];if(!c)return;
    const P=x=>x?(previewMap[x]||(rel+x)):"";
    c.introImg=P(c.introImg);c.introMap=P(c.introMap);
    (c.sections||[]).forEach(s=>walkImgs(s.items,P));
  });return cl;
}
function buildPublishState(){   // pour publier : chemins préfixés selon la profondeur de chaque langue
  const cl=JSON.parse(JSON.stringify(state));
  LANGS.forEach(l=>{const c=cl.langs[l];if(!c)return;const rel=REL[l];const P=x=>x?(rel+x):"";
    c.introImg=P(c.introImg);c.introMap=P(c.introMap);
    (c.sections||[]).forEach(s=>walkImgs(s.items,P));
  });return cl;
}
function buildMeta(){
  const en=state.langs.en,fr=state.langs.fr,ar=state.langs.ar||{};
  return {slug:meta.slug||G.slugify(en.sci||fr.sci),
    order:{slug:meta.order.slug,en:meta.order.name,fr:meta.order.name,ar:meta.order.name},
    family:{slug:meta.family.slug,en:meta.family.name,fr:meta.family.name,ar:meta.family.name},
    common:{en:en.name,fr:fr.name,ar:ar.name||en.name},
    title:{en:meta.title.en||en.name,fr:meta.title.fr||fr.name,ar:meta.title.ar||ar.name||en.name},
    description:{en:meta.description.en,fr:meta.description.fr,ar:meta.description.ar||""},
    scientific:en.sci||fr.sci,
    statusEN:(G.IUCN.find(x=>x.c===state.statusCode)||{}).en||"",
    introImg:en.introImg||fr.introImg||""};
}
function preview(){
  const S="https://fauna-morocco.org/";
  const ps=buildStateRel(S);
  const body=G2.generateBody(ps,L,{});
  const w=window.open("","_blank");
  w.document.write(`<!doctype html><html lang="${L}" dir="${L==='ar'?'rtl':'ltr'}"><head><meta charset="utf-8"><link rel="stylesheet" href="${S}css/general.css"><link rel="stylesheet" href="${S}encyclopedia/species-account.css"><link rel="stylesheet" href="${S}css/reskin.css"><link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"></head><body>${body}<script src="${S}encyclopedia/species-account.js"><\/script></body></html>`);
  w.document.close();
}
function exportJSON(){const w=window.open("","_blank");w.document.write("<pre style='color:#7fdc9e;background:#111;padding:16px;font:12px monospace'>"+JSON.stringify({meta:buildMeta(),state:state},null,2).replace(/</g,"&lt;")+"</pre>");w.document.close();}
function toast(m){const t=document.getElementById("toast");t.textContent=m;t.style.display="block";clearTimeout(t._t);t._t=setTimeout(()=>t.style.display="none",2600);}

/* ===================== connexion serveur (enregistrer / publier / upload) ===================== */
const API=(location.origin&&location.origin!=="null")?location.origin:"";
let AUTH={key:(typeof sessionStorage!=="undefined"&&sessionStorage.getItem("fauna_key"))||"",pub:""};
function needKey(){if(!AUTH.key){AUTH.key=(prompt("Mot de passe d'édition :")||"").trim();if(AUTH.key&&typeof sessionStorage!=="undefined")sessionStorage.setItem("fauna_key",AUTH.key);}return AUTH.key;}
async function saveDraft(silent){
  const m=buildMeta();
  if(!m.slug||!m.order.slug||!m.family.slug){alert("Renseigne le slug, l'ordre et la famille dans « Réglages page » avant d'enregistrer.");return null;}
  if(!API){toast("Enregistrement disponible une fois l'outil en ligne.");return null;}
  const key=needKey();if(!key)return null;
  try{
    const r=await fetch(API+"/api/drafts/"+m.slug,{method:"PUT",headers:{"Content-Type":"application/json","x-fauna-key":key},body:JSON.stringify({meta:m,state:buildPublishState()})});
    if(r.status===401){AUTH.key="";if(typeof sessionStorage!=="undefined")sessionStorage.removeItem("fauna_key");toast("Mot de passe d'édition refusé.");return null;}
    if(!r.ok){const e=await r.json().catch(()=>({}));toast("Erreur : "+(e.error||r.status));return null;}
    if(!silent)toast("Brouillon enregistré.");return {slug:m.slug};
  }catch(e){toast("Serveur injoignable.");return null;}
}
async function publish(){
  const d=await saveDraft(true);if(!d)return;
  if(!AUTH.pub)AUTH.pub=(prompt("Mot de passe de publication :")||"").trim();if(!AUTH.pub)return;
  try{
    const r=await fetch(API+"/api/publish/"+d.slug,{method:"POST",headers:{"Content-Type":"application/json","x-fauna-publish":AUTH.pub}});
    if(r.status===401){AUTH.pub="";toast("Mot de passe de publication refusé.");return;}
    if(!r.ok){const e=await r.json().catch(()=>({}));toast("Erreur publication : "+(e.error||r.status));return;}
    toast("Publié ! Mise en ligne dans ~2-3 min.");
  }catch(e){toast("Serveur injoignable.");}
}
function compress(file){return new Promise(res=>{const img=new Image();img.onload=()=>{const max=1600;let w=img.width,h=img.height;if(w>max){h=Math.round(h*max/w);w=max;}const c=document.createElement("canvas");c.width=w;c.height=h;c.getContext("2d").drawImage(img,0,0,w,h);res(c.toDataURL("image/jpeg",0.82));};img.onerror=()=>res(null);img.src=URL.createObjectURL(file);});}
async function uploadImage(path,file){
  if(!API)return;const key=needKey();if(!key)return;
  const data=await compress(file);if(!data)return;
  try{const r=await fetch(API+"/api/upload",{method:"POST",headers:{"Content-Type":"application/json","x-fauna-key":key},body:JSON.stringify({path,data})});
    if(r.ok){delete pendingUploads[path];toast("Image envoyée.");}else{toast("Image gardée pour la publication.");}
  }catch(e){/* reste dans pendingUploads */}
}

/* ===================== langue / divers ===================== */
function renderLangSwitch(){const sw=document.getElementById("langsw");sw.innerHTML="";LANGS.forEach(l=>{const b=document.createElement("button");b.textContent=l.toUpperCase();if(l===L)b.className="on";b.onclick=()=>{L=l;render();};sw.appendChild(b);});}
function closeMenus(){document.querySelectorAll(".stmenu.show").forEach(m=>m.classList.remove("show"));}
document.addEventListener("click",()=>{closeMenus();setTimeout(()=>{const s=window.getSelection();if(s.isCollapsed)document.getElementById("seltool").classList.remove("show");},10);});

/* ===================== init : pré-remplissage depuis le tableau de bord, ou fiche d'exemple ===================== */
function blankSection(){return {title:"",icon:"fa-info-circle",blocks:[{type:"text",text:""}],subs:[],subspecies:[]};}
// Charge l'état réel d'une fiche existante : d'abord l'état bundlé (fiches d'avant l'outil),
// puis l'état serveur d'une fiche déjà publiée. Renvoie {meta,state} ou null.
async function loadRealState(slug){
  try{ const r=await fetch("states/"+encodeURIComponent(slug)+".json",{cache:"no-store"}); if(r.ok) return await r.json(); }catch(e){}
  if(API && AUTH.key){ try{ const r=await fetch(API+"/api/state/"+encodeURIComponent(slug),{headers:{"x-fauna-key":AUTH.key}}); if(r.ok) return await r.json(); }catch(e){} }
  return null;
}
function loadStateInto(loaded){
  if(!loaded||!loaded.state) return false;
  if(loaded.meta) meta=loaded.meta;
  state=loaded.state;
  LANGS.forEach(l=>{ if(!state.langs[l]) state.langs[l]=blankLang(); });
  return true;
}
(async function init(){
  const p=new URLSearchParams(location.search);
  const slug=(p.get("slug")||"").trim();
  if(slug){
    const loaded=await loadRealState(slug);
    if(loadStateInto(loaded)){ toast&&toast("Fiche existante chargée."); render(); return; }
  }
  if(p.get("sci")||slug){
    const sci=(p.get("sci")||"").trim();
    if(slug && p.get("existing")==="1"){ alert("Cette fiche a été créée avant l'éditeur : il n'y a pas d'état à recharger, donc l'éditeur repart d'un modèle vierge.\n\nSi tu l'enregistres, elle sera reconstruite au format de l'éditeur. Sinon, laisse-la telle quelle sur le site."); }
    const order=p.get("order")||"sauria", family=p.get("family")||"";
    const o=ORDERS.find(x=>x.slug===order)||{slug:order,name:order.charAt(0).toUpperCase()+order.slice(1)};
    const fa=FAMILIES.find(x=>x.slug===family)||{slug:family,name:family.charAt(0).toUpperCase()+family.slice(1)};
    meta={slug:slug,order:{slug:o.slug,name:o.name},family:{slug:fa.slug,name:fa.name},title:{en:"",fr:"",ar:""},description:{en:"",fr:"",ar:""}};
    state={statusCode:"LC",trendCode:"decreasing",refs:[],langs:{}};
    LANGS.forEach(l=>{const c=blankLang();c.sci=sci;state.langs[l]=c;});
    SECTION_PRESETS.forEach(pp=>LANGS.forEach(l=>state.langs[l].sections.push({title:pp[l]||pp.en,icon:pp.icon,items:[{kind:"text",text:""}]})));
  } else {
    LANGS.forEach(l=>{ if(!state.langs[l]){ const b=JSON.parse(JSON.stringify(state.langs.fr)); b.name="";b.intro=""; (b.sections||[]).forEach(s=>{s.title="";(s.blocks||[]).forEach(bl=>{if(bl.type==="text")bl.text="";(bl.images||[]).forEach(im=>im.cap="");});(s.subs||[]).forEach(su=>{su.title="";su.text="";});(s.subspecies||[]).forEach(sp=>{sp.title="";sp.text="";});}); state.langs[l]=b; } });
  }
  render();
})();
</script>
