<title>Encyclopédie — Tableau de bord</title>
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@500;600;700&family=Lato:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">

<style>
:root{--ocre:#C06A2C;--ocre-deep:#9E5220;--bg:#f8f9fa;--card:#fff;--line:#e9ecef;--text:#333;--muted:#666}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Lato',Arial,sans-serif;background:var(--bg);color:var(--text);padding:26px 20px 90px}
h1,h2,h3,h4,.os{font-family:'Oswald',sans-serif;text-transform:uppercase;letter-spacing:.03em}
.wrap{max-width:1000px;margin:0 auto}
.logo{font-weight:700;letter-spacing:.14em;color:var(--ocre);font-size:13px}
h1{font-size:25px;margin-bottom:2px;color:#222}
.progress{height:10px;background:#e9ecef;border-radius:6px;overflow:hidden;margin:12px 0 4px}
.progress .bar{height:100%;background:var(--ocre);transition:width .3s}
.sub{color:var(--muted);font-size:13px}
.tools{display:flex;gap:10px;flex-wrap:wrap;align-items:center;margin:18px 0}
.tools input{flex:1;min-width:200px;background:#fff;border:1px solid var(--line);color:var(--text);border-radius:9px;padding:10px 13px;font-size:13.5px}
.btn{background:#fff;color:var(--text);border:1px solid var(--line);border-radius:9px;padding:9px 13px;font:700 12px/1 'Oswald';letter-spacing:.04em;text-transform:uppercase;cursor:pointer}
.btn:hover{border-color:var(--ocre);color:var(--ocre)}
.legend{display:flex;gap:10px;flex-wrap:wrap;font-size:11.5px;color:var(--muted);margin-bottom:8px;align-items:center}
.badge{display:inline-flex;align-items:center;gap:5px;padding:3px 10px;border-radius:20px;font:700 10.5px/1 'Lato';letter-spacing:.03em;cursor:pointer;user-select:none}
.b-published,.b-live{background:#e6f4e6;color:#2e7d32}
.b-todo{background:#eef0f2;color:#6b7178}
.b-soon{background:#e6f0fa;color:#2b6ca3}
.b-draft{background:#fbeecf;color:#9a6a12}
.group{background:var(--card);border:1px solid var(--line);border-radius:14px;margin-bottom:16px;overflow:hidden;box-shadow:0 1px 3px rgba(0,0,0,.04)}
.ghead{display:flex;align-items:center;gap:10px;padding:14px 18px;flex-wrap:wrap;border-bottom:1px solid var(--line);background:#fcfcfd}
.ghead h2{font-size:17px;color:#222}.ghead .cnt{color:var(--muted);font-size:12.5px}.ghead .sp{flex:1}
.ord{display:inline-flex;flex-direction:column;gap:1px}
.ord button{background:none;border:none;color:#b7bdc4;cursor:pointer;font-size:9px;line-height:1;padding:1px}
.ord button:hover{color:var(--ocre)}
.toggle{display:flex;border:1px solid var(--line);border-radius:16px;overflow:hidden}
.toggle button{background:#fff;border:none;color:var(--muted);padding:5px 11px;font:600 11px/1 'Oswald';letter-spacing:.04em;cursor:pointer;text-transform:uppercase}
.toggle button.on{background:var(--ocre);color:#fff}
.gbody{padding:4px 12px 14px}
.fam{margin:12px 6px 2px;display:flex;gap:8px;align-items:center;border-bottom:1px solid var(--line);padding-bottom:6px;flex-wrap:wrap}
.fam h3{font-size:12.5px;letter-spacing:.06em;color:var(--ocre)}
.fam .fc{color:var(--muted);font-size:11px}.fam .sp{flex:1}
.mini{background:none;border:none;color:#adb3ba;cursor:pointer;font-size:12px;padding:3px 6px;border-radius:6px}
.mini:hover{color:var(--ocre)}.mini.del:hover{color:#c52412}
.genus{margin:9px 6px 2px;display:flex;gap:8px;align-items:center}
.genus h4{font:700 10.5px/1 'Oswald';letter-spacing:.1em;text-transform:uppercase;color:#8a8f96}
.genus .sp{flex:1}
.row{display:flex;align-items:center;gap:10px;padding:7px 8px;border-radius:8px}
.row:hover{background:#f4f5f6}
.row .sci{flex:1;font-style:italic;font-size:14px;cursor:text;color:#333}
.row .sci a{color:#333;text-decoration:none;border-bottom:1px dashed transparent}.row .sci a:hover{border-color:var(--ocre);color:var(--ocre)}
.row .act{color:var(--muted);text-decoration:none;font:700 11px/1 'Oswald';letter-spacing:.04em;text-transform:uppercase;padding:6px 10px;border:1px solid var(--line);border-radius:7px}
.row .act:hover{border-color:var(--ocre);color:var(--ocre)}
.addbtn{background:none;border:1px dashed #cfd4da;color:var(--muted);border-radius:20px;padding:6px 12px;font:600 11.5px/1 'Lato';cursor:pointer;margin:8px 6px}
.addbtn:hover{border-color:var(--ocre);color:var(--ocre)}
.genusToggle{font:600 10.5px/1 'Oswald';letter-spacing:.04em;text-transform:uppercase;color:var(--muted);cursor:pointer;border:1px solid var(--line);border-radius:14px;padding:4px 9px;background:#fff}
.genusToggle.on{background:var(--ocre);color:#fff;border-color:var(--ocre)}
.note{color:#9aa0a6;font-size:11.5px;margin-top:18px;text-align:center}
</style></head>

  const cancel=el("button","btn");cancel.textContent="Annuler";cancel.onclick=()=>document.body.removeChild(ov);
  const okb=el("button","btn");okb.textContent="Enregistrer";okb.style.cssText="background:var(--ocre,#C06A2C);color:#fff;border-color:var(--ocre,#C06A2C)";
  okb.onclick=()=>{document.body.removeChild(ov);onSave({fr:iFr.value.trim(),en:iEn.value.trim(),ar:iAr.value.trim()});};
  bar.appendChild(cancel);bar.appendChild(okb);pan.appendChild(bar);
  ov.appendChild(pan);ov.onclick=(e)=>{if(e.target===ov)document.body.removeChild(ov);};document.body.appendChild(ov);iFr.focus();
}
function moveSpeciesPicker(srcFam,s){
  // overlay
  const ov=el("div");ov.style.cssText="position:fixed;inset:0;background:rgba(20,15,10,.45);display:flex;align-items:center;justify-content:center;z-index:9999";
  const pan=el("div");pan.style.cssText="background:#fff;border-radius:10px;padding:18px 18px 14px;width:min(440px,92vw);box-shadow:0 12px 40px rgba(0,0,0,.3);font-family:inherit";
  const t=el("div");t.style.cssText="font-weight:600;margin-bottom:4px;color:#3a2f26";t.textContent="Déplacer une espèce";
  const sub=el("div");sub.style.cssText="font-size:13px;color:#7a7068;margin-bottom:12px";sub.innerHTML=`<i>${s.scientific}</i> — actuellement dans <b>${srcFam.name}</b>`;
  const sel=document.createElement("select");sel.style.cssText="width:100%;padding:8px;border:1px solid var(--line,#d9d4cd);border-radius:6px;font-size:14px;margin-bottom:6px";
  DATA.groups.forEach(g=>{const og=document.createElement("optgroup");og.label=g.name+" ("+g.order+")";g.families.forEach(fam=>{const o=document.createElement("option");o.value=g.families.indexOf(fam)+"@"+DATA.groups.indexOf(g);o.textContent=fam.name+(fam===srcFam?" — (actuelle)":"");if(fam===srcFam)o.disabled=true;og.appendChild(o);});sel.appendChild(og);});
  const warn=el("div");warn.style.cssText="font-size:12px;color:#c56a00;min-height:16px;margin-bottom:8px";
  if(s.status==="published"||s.path)warn.textContent="⚠ Espèce publiée : dépublie-la d'abord (sinon sa fiche reste à l'ancien emplacement).";
  const bar=el("div");bar.style.cssText="display:flex;gap:8px;justify-content:flex-end";
  const cancel=el("button","btn");cancel.textContent="Annuler";cancel.onclick=()=>document.body.removeChild(ov);
  const okb=el("button","btn");okb.textContent="Déplacer";okb.style.cssText="background:var(--ocre,#C06A2C);color:#fff;border-color:var(--ocre,#C06A2C)";
  okb.onclick=()=>{const[fi,gi]=sel.value.split("@").map(Number);const dg=DATA.groups[gi];const df=dg&&dg.families[fi];if(!df||df===srcFam){document.body.removeChild(ov);return;}
    const i=srcFam.species.indexOf(s);if(i>=0)srcFam.species.splice(i,1);
    s.family=df.slug;s.order=df.order;delete s.thumb; // la miniature vit sous l'ancien dossier famille -> à re-uploader
    df.species.push(s);document.body.removeChild(ov);render();};
  bar.appendChild(cancel);bar.appendChild(okb);
  pan.appendChild(t);pan.appendChild(sub);pan.appendChild(sel);pan.appendChild(warn);pan.appendChild(bar);
  ov.appendChild(pan);ov.onclick=(e)=>{if(e.target===ov)document.body.removeChild(ov);};
  document.body.appendChild(ov);
}
function addSpecies(f){const v=prompt("Nom scientifique :","");if(!v)return;const s={scientific:v.trim(),slug:slugify(v.split(" ").slice(0,2).join(" ")),status:"todo",order:f.order,family:f.slug};f.species.push(s);render();namesModal("Nom commun de l'espèce","<i>"+s.scientific+"</i> — affiché dans le menu (laisser vide si inconnu)",{},n=>{if(n.fr||n.en||n.ar)s.common=n;render();});}
function addFamily(g){const v=prompt("Nom de la nouvelle famille :","");if(!v)return;g.families.push({slug:slugify(v),name:v.trim(),order:g.order,groupByGenus:false,status:"todo",species:[]});render();}

function render(){
  const list=document.getElementById("list");list.innerHTML="";let tot=0,pub=0;
  DATA.groups.forEach(g=>{
    const all=g.families.flatMap(f=>f.species);tot+=all.length;pub+=all.filter(s=>s.status==="published").length;
    if(q&&!all.some(matches))return;
    const gEl=el("div","group");const head=el("div","ghead");
    head.appendChild(ordBtns(DATA.groups,g,render));
    const h2=el("h2");h2.textContent=g.name;head.appendChild(h2);
    head.appendChild(statusBadge(()=>g.status,v=>g.status=v,NODE_CYCLE));
    const cnt=el("span","cnt");cnt.textContent=`${all.filter(s=>s.status==="published").length}/${all.length} publiées`;head.appendChild(cnt);
    const onL=!!(ST.landing&&ST.landing[g.order]);
    const ls=el("span","badge "+(onL?"b-live":"b-soon"));ls.style.marginLeft="8px";ls.textContent="Accueil : "+(onL?"EN LIGNE":"masqué");head.appendChild(ls);
    const lbtn=el("button","addbtn");lbtn.style.cssText="margin-left:6px;font-size:12px";lbtn.innerHTML='<i class="fas fa-globe"></i> '+(onL?"Masquer de l'accueil":"Afficher sur l'accueil");lbtn.onclick=()=>landingSet(g.order,!onL);head.appendChild(lbtn);
    head.appendChild(el("span","sp"));
    const tg=el("div","toggle");tg.innerHTML=`<button data-l="family" class="${g.displayLevel==='family'?'on':''}">Familles</button><button data-l="species" class="${g.displayLevel==='species'?'on':''}">Espèces</button>`;
    tg.querySelectorAll("button").forEach(btn=>btn.onclick=()=>{g.displayLevel=btn.dataset.l;render();});
    head.appendChild(tg);gEl.appendChild(head);
    const body=el("div","gbody");
    if(g.displayLevel==="family"){g.families.forEach(f=>familyBlock(g,f,body));const af=el("button","addbtn");af.innerHTML='<i class="fas fa-plus"></i> Ajouter une famille';af.onclick=()=>addFamily(g);body.appendChild(af);}
    else{all.filter(matches).slice().sort((a,b)=>a.scientific.localeCompare(b.scientific)).forEach(s=>{const f=g.families.find(x=>x.species.includes(s));body.appendChild(speciesRow(f,s,f.species));});}
    gEl.appendChild(body);list.appendChild(gEl);
  });
  document.getElementById("bar").style.width=(tot?pub/tot*100:0)+"%";
  document.getElementById("prog").textContent=`${pub} espèces publiées sur ${tot} — reste ${tot-pub} à documenter`;
}
function exportData(){let tot=0,pub=0;DATA.groups.forEach(g=>g.families.forEach(f=>f.species.forEach(s=>{tot++;if(s.status==="published")pub++;})));return JSON.stringify({generated:new Date().toISOString().slice(0,10),total:tot,published:pub,groups:DATA.groups},null,2);}
function downloadJSON(){const a=document.createElement("a");a.href=URL.createObjectURL(new Blob([exportData()],{type:"application/json"}));a.download="species-list.json";a.click();}
function copyJSON(){navigator.clipboard.writeText(exportData()).then(()=>alert("Liste copiée."));}
document.getElementById("q").oninput=e=>{q=e.target.value.toLowerCase().trim();render();};
const API=(location.origin&&location.origin!=="null")?location.origin:"";
let KEY=(typeof sessionStorage!=="undefined"&&sessionStorage.getItem("fauna_key"))||"";
function needKey(){if(!KEY){KEY=(prompt("Mot de passe d'édition :")||"").trim();if(KEY&&typeof sessionStorage!=="undefined")sessionStorage.setItem("fauna_key",KEY);}return KEY;}
let ST={landing:{},menus:{},published:[]};
// Réorganisation SUR LE MENU DU SITE : 6 cartes d'ordre (comme la page d'accueil de l'encyclopédie).
const ORDER_UNITS=[
  {slug:"caudata",name:"Caudata — Urodèles (salamandres & tritons)",order:"caudata",m:f=>f.order==="caudata"},
  {slug:"sauria",name:"Sauria — Lézards",order:"sauria",m:f=>f.order==="sauria"&&f.slug!=="amphisbaenia"},
  {slug:"serpentes",name:"Serpentes — Serpents",order:"serpentes",m:f=>f.order==="serpentes"},
  {slug:"anura",name:"Anura — Grenouilles & crapauds",order:"anura",m:f=>f.order==="anura"},
  {slug:"testudines",name:"Testudines — Tortues",order:"testudines",m:f=>f.order==="testudines"},
  {slug:"amphisbaenia",name:"Amphisbaenia — Amphisbènes",order:"amphisbaenia",m:f=>f.slug==="amphisbaenia"}
];
function regroupByOrder(){
  // idempotent : si la liste est DÉJÀ en 6 ordres, on garde tel quel (préserve ordre + affichage)
  const cur=DATA.groups.map(g=>g.slug).sort().join(",");
  const tgt=ORDER_UNITS.map(u=>u.slug).sort().join(",");
  if(cur===tgt) return;
  const all=[];DATA.groups.forEach(g=>(g.families||[]).forEach(f=>all.push(f)));
  DATA.groups=ORDER_UNITS.map(u=>({slug:u.slug,name:u.name,order:u.order,displayLevel:"family",families:all.filter(u.m)}));
}
async function applySite(){
  if(!API){alert("Disponible une fois l'outil en ligne.");return;}
  if(!confirm("Appliquer ton arborescence au site ?\nRégénère l'ordre des menus + les pages de famille/genre pour coller à ce que tu vois ici."))return;
  const pub=(prompt("Mot de passe de publication :")||"").trim();if(!pub)return;
  try{const r=await fetch(API+"/api/apply-site",{method:"POST",headers:{"Content-Type":"application/json","x-fauna-publish":pub},body:exportData()});const d=await r.json().catch(()=>({}));alert(r.ok?(d.note||"Appliqué."):("Erreur : "+(d.error||r.status)));}catch(e){alert("Serveur injoignable.");}
}
async function loadServer(){
  if(!API)return;
  try{
    const r=await fetch(API+"/api/species-list",{headers:{"x-fauna-key":needKey()}});
    if(r.ok){const d=await r.json();if(d&&d.groups){DATA.groups=d.groups;regroupByOrder();}}
    else if(r.status===401){KEY="";if(typeof sessionStorage!=="undefined")sessionStorage.removeItem("fauna_key");}
    try{const rs=await fetch(API+"/api/site-state",{headers:{"x-fauna-key":KEY}});if(rs.ok)ST=await rs.json();}catch(e){}
    render();
  }catch(e){}
}
async function landingSet(order,online){
  if(!API){alert("Disponible une fois l'outil en ligne.");return;}
  const pub=(prompt("Mot de passe de publication :")||"").trim();if(!pub)return;
  try{const r=await fetch(API+"/api/landing-toggle/"+order,{method:"POST",headers:{"Content-Type":"application/json","x-fauna-publish":pub},body:JSON.stringify({online:online})});const d=await r.json().catch(()=>({}));if(r.ok){ST.landing=ST.landing||{};ST.landing[order]=online;render();alert(d.note||"OK");}else alert("Erreur : "+(d.error||r.status));}catch(e){alert("Serveur injoignable.");}
}
async function menuSet(order,slug,active){
  if(!API){alert("Disponible une fois l'outil en ligne.");return;}
  const pub=(prompt("Mot de passe de publication :")||"").trim();if(!pub)return;
  try{const r=await fetch(API+"/api/menu-toggle/"+order+"/"+slug,{method:"POST",headers:{"Content-Type":"application/json","x-fauna-publish":pub},body:JSON.stringify({active:active})});const d=await r.json().catch(()=>({}));if(r.ok){ST.menus[order]=ST.menus[order]||{cells:{}};ST.menus[order].cells[slug]=active;render();alert(d.note||"OK");}else alert("Erreur : "+(d.error||r.status));}catch(e){alert("Serveur injoignable.");}
}
async function unpublish(f,s){
  if(!API){alert("Disponible une fois l'outil en ligne.");return;}
  if(!confirm("Dépublier « "+s.scientific+" » ?\n(Retiré du menu / plus cliquable. La fiche reste, réversible.)"))return;
  const pub=(prompt("Mot de passe de publication :")||"").trim();if(!pub)return;
  try{const r=await fetch(API+"/api/unpublish/"+s.slug,{method:"POST",headers:{"Content-Type":"application/json","x-fauna-publish":pub}});const d=await r.json().catch(()=>({}));if(r.ok){s.status="todo";ST.published=(ST.published||[]).filter(x=>x!==s.slug);render();alert(d.note||"OK");}else alert("Erreur : "+(d.error||r.status));}catch(e){alert("Serveur injoignable.");}
}
async function deletePage(f,s){
  if(!API){alert("Disponible une fois l'outil en ligne.");return;}
  if(!confirm("Supprimer la PAGE de « "+s.scientific+" » ?\n\nLes fichiers de la fiche (HTML EN/FR/AR) seront supprimés et l'entrée retirée du sitemap.\nL'espèce RESTE dans le tableau de bord, en « coming soon ».\nRéversible : la republier régénère la fiche."))return;
  const pub=(prompt("Mot de passe de publication :")||"").trim();if(!pub)return;
  try{const r=await fetch(API+"/api/delete-page/"+s.slug,{method:"POST",headers:{"Content-Type":"application/json","x-fauna-publish":pub}});const d=await r.json().catch(()=>({}));if(r.ok){s.status="todo";delete s.path;ST.published=(ST.published||[]).filter(x=>x!==s.slug);render();alert(d.note||"Page supprimée.");}else alert("Erreur : "+(d.error||r.status));}catch(e){alert("Serveur injoignable.");}
}
async function saveServer(){if(!API){alert("Disponible une fois l'outil en ligne.");return;}const key=needKey();if(!key)return;try{const r=await fetch(API+"/api/species-list",{method:"PUT",headers:{"Content-Type":"application/json","x-fauna-key":key},body:exportData()});alert(r.ok?"Liste enregistrée sur le serveur.":"Erreur ("+r.status+").");}catch(e){alert("Serveur injoignable.");}}
/* ---- miniatures (1200×720, recadrage auto) ---- */
const previewThumb={};
function thumbPath(f,s){return `images/encyclopedia/${s.order||f.order}/${s.family||f.slug}/${s.slug}.jpg`;}
function compressCover(file,W,H){return new Promise(res=>{const img=new Image();img.onload=()=>{const c=document.createElement("canvas");c.width=W;c.height=H;const ir=img.width/img.height,tr=W/H;let sw,sh,sx,sy;if(ir>tr){sh=img.height;sw=sh*tr;sx=(img.width-sw)/2;sy=0;}else{sw=img.width;sh=sw/tr;sx=0;sy=(img.height-sh)/2;}c.getContext("2d").drawImage(img,sx,sy,sw,sh,0,0,W,H);res(c.toDataURL("image/jpeg",0.85));};img.onerror=()=>res(null);img.src=URL.createObjectURL(file);});}
// Cellule miniature générique (espèce, famille OU genre). Affiche l'image DÉJÀ EN LIGNE sur le
// site (chemin conventionnel) si elle existe, sinon un placeholder ; clic = envoyer/remplacer.
function thumbCell(pathRel,title){
  const th=el("span");th.style.cssText="width:44px;height:26px;border-radius:4px;overflow:hidden;flex:none;background:#eef0f2;display:flex;align-items:center;justify-content:center;cursor:pointer;border:1px solid var(--line)";
  const ph=()=>{th.innerHTML='<i class="fas fa-image" style="color:#c0c4c9;font-size:11px"></i>';};
  const im=document.createElement("img");im.src=previewThumb[pathRel]||("https://fauna-morocco.org/"+pathRel);im.style.cssText="width:100%;height:100%;object-fit:cover";im.onerror=ph;th.appendChild(im);
  th.title=title||"Ajouter / changer la miniature (1200×720)";th.onclick=()=>uploadImageTo(pathRel);
  return th;
}
function uploadImageTo(pathRel,cb){
  if(!API){alert("Disponible une fois l'outil en ligne.");return;}
  const key=needKey();if(!key)return;
  const inp=document.createElement("input");inp.type="file";inp.accept="image/*";
  inp.onchange=async()=>{if(!inp.files[0])return;const data=await compressCover(inp.files[0],1200,720);if(!data)return;
    try{const r=await fetch(API+"/api/upload",{method:"POST",headers:{"Content-Type":"application/json","x-fauna-key":key},body:JSON.stringify({path:pathRel,data})});
      if(r.ok){previewThumb[pathRel]=data;if(cb)cb();render();alert("Image envoyée (visible sur le site au prochain déploiement).");}
      else{const d=await r.json().catch(()=>({}));alert("Échec de l'envoi ("+r.status+") "+(d.error||""));}
    }catch(e){alert("Serveur injoignable.");}
  };inp.click();
}
regroupByOrder();
render();
loadServer();
</script></body></html>
